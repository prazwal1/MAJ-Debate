version: "3.9"

services:
  debate-app:
    build:
      context: .            # build from web_app/ — fully self-contained
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NIM_API_KEY=${NIM_API_KEY:-}
    volumes:
      - debate_cache:/app/cache   # persist request cache across restarts
    restart: unless-stopped

volumes:
  debate_cache:
